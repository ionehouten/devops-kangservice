apiVersion: v1
kind: Secret
metadata:
  name: pgbench-secret
  namespace: benchmark
  labels:
    app: pgbench
type: Opaque
stringData:
  # Keep container running for debugging if needed
  KEEP_ALIVE: "true"
  # Database Connection
  DB_NAME: benchmark_db
  DB_HOST: my-cluster-rw.production.svc.cluster.local
  DB_PORT: "5432"
  DB_USER: postgres
  DB_PASSWORD: ''
  # Benchmark Parameters
  SCALE_FACTOR: "100"
  DURATION: "300"
  MAX_CLIENTS: "100"
  WARMUP_TIME: "30"
  # Test Types (true/false)
  RUN_READONLY: "true"
  RUN_READWRITE: "true"
  RUN_TPCB: "true"
  RUN_LATENCY: "true"
  # Monitoring
  MONITOR_INTERVAL: "5"
  COLLECT_PG_STAT: "false"
