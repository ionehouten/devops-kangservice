apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-benchmark-script
  namespace: benchmark
data:
  script.sh: |
    #!/bin/sh
    set -e

    echo "========================================"
    echo "Running Redis benchmark @ $(date)"
    echo "========================================"

    redis-benchmark \
      -h "$REDIS_HOST" \
      -p "$REDIS_PORT" \
      -a "$REDIS_PASSWORD" \
      -c "$CONCURRENCY" \
      -n "$REQUESTS" \
      -d "$PAYLOAD" \
      -t set,get,ping

    echo "Benchmark finished, sleeping 60s..."
    sleep 60
