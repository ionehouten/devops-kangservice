name: Versioning
description: Create container image version and tags
author: 'kangservice.cloud'

inputs:
  image_repo:
    description: Container Registry Path
    required: true

  image_suffix:
    description: Optional image suffix
    required: false

outputs:
  short_sha:
    description: Commit SHA
    value: ${{ steps.version.outputs.SHORT_SHA }}

  version:
    description: Version
    value: ${{ steps.version.outputs.VERSION }}

  image_ref:
    description: Image Ref
    value: ${{ steps.version.outputs.IMAGE_REF }}

  image_ref_latest:
    description: Latest Image Ref
    value: ${{ steps.version.outputs.IMAGE_REF_LATEST }}

  is_release:
    description: Is Release Tag
    value: ${{ steps.version.outputs.IS_RELEASE }}

  is_default_branch:
    description: Is Default Branch
    value: ${{ steps.version.outputs.IS_DEFAULT_BRANCH }}

runs:
  using: composite

  steps:
    - name: Generate Version
      id: version
      shell: bash
      env:
        INPUT_IMAGE_REPO: ${{ inputs.image_repo }}
        INPUT_IMAGE_SUFFIX: ${{ inputs.image_suffix }}
        GH_REF_NAME: ${{ github.ref_name }}
        GH_REF_TYPE: ${{ github.ref_type }}
        GH_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: |
        set -euo pipefail

        REGISTRY="$INPUT_IMAGE_REPO"
        IMAGE_SUFFIX=$(echo "$INPUT_IMAGE_SUFFIX" | tr '[:upper:]' '[:lower:]')

        REF_NAME="$GH_REF_NAME"
        REF_TYPE="$GH_REF_TYPE"
        DEFAULT_BRANCH="$GH_DEFAULT_BRANCH"

        SHORT_SHA="${GITHUB_SHA::7}"
        IS_RELEASE=false
        IS_DEFAULT_BRANCH=false
        
        if [ -n "$IMAGE_SUFFIX" ]; then
          IMAGE_SUFFIX="-$IMAGE_SUFFIX"
        fi
        
        #################################################
        # Release Tag
        #################################################

        if [[ "$REF_TYPE" == "tag" ]]; then
          if [[ ! "$REF_NAME" =~ ^v ]]; then
            echo "Tag must start with 'v'"
            exit 1
          fi
          VERSION="$REF_NAME"
          IS_RELEASE=true

        #################################################
        # Default Branch
        #################################################

        elif [[ "$REF_NAME" == "$DEFAULT_BRANCH" ]]; then
          VERSION="$SHORT_SHA"
          IS_DEFAULT_BRANCH=true

        #################################################
        # Feature Branch
        #################################################
        
        else
          SANITIZED=$(echo "$REF_NAME" \
            | tr '/' '-' \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9.-]/-/g' \
            | sed 's/--*/-/g')
          VERSION="branch-$SANITIZED"
        fi
        
        IMAGE_REF="$REGISTRY:$VERSION$IMAGE_SUFFIX"
        IMAGE_REF_LATEST=""
        if [[ "$IS_RELEASE" == "true" ]] || [[ "$IS_DEFAULT_BRANCH" == "true" ]]; then
          IMAGE_REF_LATEST="$REGISTRY:latest$IMAGE_SUFFIX"
        fi
        
        echo "================================="
        echo "Ref Type          : $REF_TYPE"
        echo "Ref Name          : $REF_NAME"
        echo "Version           : $VERSION"
        echo "Image Ref         : $IMAGE_REF"
        echo "Image Ref Latest  : $IMAGE_REF_LATEST"
        echo "================================="
        
        echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_OUTPUT"
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "IMAGE_REF=$IMAGE_REF" >> "$GITHUB_OUTPUT"
        echo "IMAGE_REF_LATEST=$IMAGE_REF_LATEST" >> "$GITHUB_OUTPUT"
        echo "IS_RELEASE=$IS_RELEASE" >> "$GITHUB_OUTPUT"
        echo "IS_DEFAULT_BRANCH=$IS_DEFAULT_BRANCH" >> "$GITHUB_OUTPUT"

