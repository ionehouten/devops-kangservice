name: Action Test | env-prepare-manual
run-name: Action Test | env-prepare-manual - ${{ inputs.environment }} - ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'Development'
        type: choice
        options:
          - Development
          - Staging
          - Production


jobs:
  GlobalVariable:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.prepare.outputs.environment }}
      environment_suffix: ${{ steps.prepare.outputs.environment_suffix }}
      image_suffix: ${{ steps.prepare.outputs.image_suffix }}
      overlays_path: ${{ steps.prepare.outputs.overlays_path }}

      short_sha: ${{ steps.prepare.outputs.short_sha }}
      version: ${{ steps.prepare.outputs.version }}
      image_tag: ${{ steps.prepare.outputs.image_tag }}
      image_tag_latest: ${{ steps.prepare.outputs.image_tag_latest }}
      is_release: ${{ steps.prepare.outputs.is_release }}
      is_default_branch: ${{ steps.prepare.outputs.is_default_branch }}
      
    steps:
      - name: Prepare Environment
        id: prepare
        uses: ionehouten/devops-kangservice/.github/actions/env-prepare-manual@main
        with:
          environment: ${{ inputs.environment }}
          provider: "GCP"
          image_name: "minipos"
          registry_domain: "asia-southeast2-docker.pkg.dev"
          registry_repo_dev: "company-development-core"
          registry_repo_stg: "company-staging-cluster"
          registry_repo_prd: "company-production-main"

