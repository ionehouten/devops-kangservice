name: Build Docker Image

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_ref:
        required: true
        type: string
      image_ref_latest:
        required: false
        type: string
      version:
        required: false
        type: string
      context:
        required: false
        type: string
        default: .
      dockerfile:
        required: false
        type: string
        default: Dockerfile
    outputs:
      digest:
        value: ${{ jobs.Build.outputs.digest }}

    secrets:
      AWS_REGION:
        required: false
      AWS_ROLE_ARN:
        required: false
      GCP_PROJECT_ID_DEV:
        required: false
      GCP_SA_DEV:
        required: false
      GCP_PROJECT_ID_STG:
        required: false
      GCP_SA_STG:
        required: false
      GCP_PROJECT_ID_PRD:
        required: false
      GCP_SA_PRD:
        required: false
      GCP_PROJECT_ID_SHARED:
        required: false
      GCP_SA_SHARED:
        required: false
      GHCR_DOMAIN:
        required: false

jobs:
  Build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-and-push.outputs.digest }}
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Authenticate to Registry
        uses: ionehouten/devops-kangservice/.github/actions/registry-login@main
        with:
          image_ref: ${{ inputs.image_ref }}
          
          # AWS Variables
          aws_region: ${{ secrets.AWS_REGION }}
          aws_role_to_assume: ${{ secrets.AWS_ROLE_ARN }}
          
          # GCP Variables
          gcp_project_dev: ${{ secrets.GCP_PROJECT_ID_DEV }}
          gcp_sa_dev: ${{ secrets.GCP_SA_DEV }}
          gcp_project_stg: ${{ secrets.GCP_PROJECT_ID_STG }}
          gcp_sa_stg: ${{ secrets.GCP_SA_STG }}
          gcp_project_prd: ${{ secrets.GCP_PROJECT_ID_PRD }}
          gcp_sa_prd: ${{ secrets.GCP_SA_PRD }}
          
          gcp_project_shared: ${{ secrets.GCP_PROJECT_ID_SHARED }}
          gcp_sa_shared: ${{ secrets.GCP_SA_SHARED }}
          
          # GHCR Variables
          ghcr_domain: ${{ secrets.GHCR_DOMAIN }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Env
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
          IMAGE_REF_LATEST: ${{ inputs.image_ref_latest }}
        run: |
          echo "IMAGE_REF=$IMAGE_REF" >> build.env
          echo "IMAGE_REF_LATEST=$IMAGE_REF_LATEST" >> build.env

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        id: build-and-push
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ inputs.image_ref }}
            ${{ inputs.image_ref_latest }}
          build-args: |
            APP_VERSION=${{ inputs.version }}
            BUILD_ENV=${{ inputs.environment }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: build.env
