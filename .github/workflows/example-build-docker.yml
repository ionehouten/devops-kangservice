name: Example | Build Docker
run-name: Example | Build Docker - ${{ inputs.environment }} - ${{ github.ref_name }} by @${{ github.actor }}

permissions:
  id-token: write
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'Development'
        type: choice
        options:
          - Development
          - Staging
          - Production

env:
  PROVIDER: GHCR
  REGISTRY_DOMAIN: ghcr.io
  REGISTRY_REPO: ionehouten
  IMAGE_NAME: custom-nginx

jobs:
  GlobalVariable:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.prepare.outputs.environment }}
      environment_suffix: ${{ steps.prepare.outputs.environment_suffix }}
      image_suffix: ${{ steps.prepare.outputs.image_suffix }}
      overlays_path: ${{ steps.prepare.outputs.overlays_path }}

      short_sha: ${{ steps.prepare.outputs.short_sha }}
      version: ${{ steps.prepare.outputs.version }}
      image_ref: ${{ steps.prepare.outputs.image_ref }}
      image_ref_latest: ${{ steps.prepare.outputs.image_ref_latest }}
      is_release: ${{ steps.prepare.outputs.is_release }}
      is_default_branch: ${{ steps.prepare.outputs.is_default_branch }}
      
    steps:
      - name: Prepare Environment
        id: prepare
        uses: ionehouten/devops-kangservice/.github/actions/env-prepare-manual@main
        with:
          environment: ${{ inputs.environment }}
          provider: ${{ env.PROVIDER }}
          registry_domain: ${{ env.REGISTRY_DOMAIN }}
          registry_repo: ${{ env.REGISTRY_REPO }}
          image_name: ${{ env.IMAGE_NAME }}

  Build:
    needs: ['GlobalVariable']
    uses: ionehouten/devops-kangservice/.github/workflows/build-docker.yml@main
    with:
      environment: ${{ needs.GlobalVariable.outputs.environment }}
      image_ref: ${{ needs.GlobalVariable.outputs.image_ref }}
      image_ref_latest: ${{ needs.GlobalVariable.outputs.image_ref_latest }}
      version: ${{ needs.GlobalVariable.outputs.version }}
      context: ./docker/test-build
    secrets: inherit