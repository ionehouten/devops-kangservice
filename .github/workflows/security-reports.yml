name: Security Scan Reports

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write

on:
  workflow_call:

jobs:
  
  Reports:
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-reports
          merge-multiple: false 

      # Merge All SARIF files into one folder
      - name: Consolidate SARIF files
        run: |
          mkdir -p security-reports
          
          # Copy and rename SARIF files
          find all-reports -name "*.sarif" -type f | while read file; do
            # Ambil nama folder sebagai prefix
            folder=$(basename $(dirname "$file"))
            filename=$(basename "$file")
            
            case "$folder" in
              *gitleaks*)     cp "$file" "security-reports/1-gitleaks-secret.sarif" ;;
              *semgrep*)      cp "$file" "security-reports/2-semgrep-sast.sarif" ;;
              *trivy-fs*)     cp "$file" "security-reports/3-trivy-dependency.sarif" ;;
              *checkov*)      cp "$file" "security-reports/4-checkov-iac.sarif" ;;
              *trivy-image*)  cp "$file" "security-reports/5-trivy-container.sarif" ;;
              *)              cp "$file" "security-reports/$folder-$filename" ;;
            esac
          done
          
          # Copy SBOM if exists
          find all-reports -name "*.spdx.json" -type f -exec cp {} security-reports/6-sbom.spdx.json \;
          
          # Results
          echo "📦 Consolidated reports:"
          ls -lh security-reports/

      - name: Upload consolidated reports
        uses: actions/upload-artifact@v7
        with:
          name: security-reports-all
          path: security-reports/
          retention-days: 30

      - name: Render GitHub Step Summary
        run: |
          echo "## 🔒 Security Scan Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All security scan reports have been consolidated into a single centralized artifact." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY


          # ==========================================
          # REVIEW WITH GHAS
          # ==========================================
          echo "### 🛡️ Review Findings with GitHub Advanced Security (GHAS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Requires GitHub Advanced Security (GHAS) license.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Open the **Security** → **Code scanning** tab." >> $GITHUB_STEP_SUMMARY
          echo "2. Review each finding, including affected files, code locations, and remediation guidance." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ==========================================
          # REVIEW WITH VS CODE
          # ==========================================
          echo "### 💻 Review Findings in Visual Studio Code" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Install the **SARIF Viewer** extension in Visual Studio Code." >> $GITHUB_STEP_SUMMARY
          echo "2. Download and extract the **security-reports-all** artifact." >> $GITHUB_STEP_SUMMARY
          echo "3. Open any **.sarif** file using the SARIF Viewer extension." >> $GITHUB_STEP_SUMMARY
          echo "4. Navigate directly to the affected source code from the reported findings." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ==========================================
          # ATTACHED REPORTS
          # ==========================================
          echo "### 📦 Included Report Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          ls -1 security-reports/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY