name: Security Code Scan

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write

on:
  workflow_call:
    inputs:
      ghas_enabled:
        description: 'Set true if private used GitHub Advanced Security License'
        required: false
        type: boolean
        default: false
       
      fail_on_vulnerability:
        description: 'If true, workflow can exit 1 if vulnerability found.'
        required: false
        type: boolean
        default: false

      secret_scan:
        description: 'Run Secret Scan'
        required: false
        type: boolean
        default: true
      gitleaks_config:
        description: "Path gitleaks config"
        required: false
        type: string
        default: ""
      sast_scan:
        description: 'Run SAST SCAN'
        required: false
        type: boolean
        default: true
      sonarqube_scan:
        description: 'Run SonarQube Scan'
        required: false
        type: boolean
        default: false
      dependency_scan:
        description: 'Run Dependency Scan'
        required: false
        type: boolean
        default: true
      iac_scan:
        description: 'Run IaC Scan'
        required: false
        type: boolean
        default: true

    outputs:
      secret_scan_result:
        value: ${{ jobs.SecretScan.outputs.outcome }}
      sast_result:
        value: ${{ jobs.SAST.outputs.outcome }}
      sonarqube_result:
        value: ${{ jobs.SonarQubeScan.result }}
      dependency_result:
        value: ${{ jobs.DependencyScan.outputs.outcome }}
      iac_result:
        value: ${{ jobs.IaCScan.outputs.outcome }}
      any_failed:
        value: ${{ jobs.Summary.outputs.any_failed }}


jobs:
  SecretScan:
    if: ${{ inputs.secret_scan }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.gitleaks.outcome }}
    steps:
      - uses: actions/checkout@v6
      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true 
        env:
          GITLEAKS_CONFIG: ${{ inputs.gitleaks_config }}
        run: |
          CONFIG=""

          if [ -n "$GITLEAKS_CONFIG" ]; then
            CONFIG="--config=/repo/$GITLEAKS_CONFIG"
          fi
          
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 detect \
            --source=/repo \
            $CONFIG \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --exit-code 1

      - name: Upload SARIF as Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif

      - name: Upload SARIF to Github Security
        if: ${{ always() && (github.event.repository.visibility == 'public' || inputs.ghas_enabled == true) }}
        uses: github/codeql-action/upload-sarif@v4 
        with:
          sarif_file: gitleaks.sarif

      # - name: Fail if secrets found 
      #   if: steps.gitleaks.outcome == 'failure'
      #   run: exit 1


  SAST:
    if: ${{ inputs.sast_scan }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.semgrep.outcome }}
    container:
      image: semgrep/semgrep
      
    steps:
      - uses: actions/checkout@v6
      
      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --severity ERROR \
            --error \
            --output semgrep.sarif
            
      - name: Upload SARIF as Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          
      # - name: Fail if vulnerabilities found
      #   if: steps.semgrep.outcome == 'failure'
      #   run: exit 1

      - name: Upload SARIF to Github Security
        if: ${{ always() && (github.event.repository.visibility == 'public' || inputs.ghas_enabled == true) }}
        uses: github/codeql-action/upload-sarif@v4 
        with:
          sarif_file: semgrep.sarif

  # SonarQubeScan config example
  # sonar-project.properties
  # sonar.projectKey=example-api
  # sonar.projectName=Example Api
  # sonar.sources=.
  # sonar.exclusions=**/*_test.go,**/vendor/**
  # sonar.tests=.
  # sonar.test.inclusions=**/*_test.go
  SonarQubeScan:
    if: ${{ inputs.sonarqube_scan }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.sonar.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        id: sonar
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  DependencyScan:
    if: ${{ inputs.dependency_scan }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.trivyfs.outcome }}
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy FS
        id: trivyfs
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: 1

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif

      - name: Upload SARIF to Github Security
        if: ${{ always() && (github.event.repository.visibility == 'public' || inputs.ghas_enabled == true) }}
        uses: github/codeql-action/upload-sarif@v4 
        with:
          sarif_file: trivy-fs.sarif

      # - name: Generate Source Code SBOM
      #   id: trivysbom
      #   continue-on-error: true
      #   uses: aquasecurity/trivy-action@v0.36.0
      #   with:
      #     scan-type: 'fs'
      #     scan-ref: '.'
      #     format: 'spdx-json'
      #     output: 'trivy-fs-sbom.spdx.json'
      
      # - name: Upload Source Code SBOM Report
      #   if: always()
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: trivy-fs-sbom
      #     path: trivy-fs-sbom.spdx.json

      # - name: Fail if vulnerabilities found
      #   if: steps.trivyfs.outcome == 'failure'
      #   run: exit 1

  # DependencyScan:
  #   if: ${{ inputs.dependency_scan }}
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Dependency Check
  #       id: depcheck
  #       continue-on-error: true
  #       uses: dependency-check/Dependency-Check_Action@main
  #       with:
  #         project: service
  #         path: .
  #         format: HTML

  #     - name: Upload Dependency Check Report
  #       if: always()
  #       uses: actions/upload-artifact@v7
  #       with:
  #         name: dependency-check-report
  #         path: reports/dependency-check-report.html

  #     - name: Fail if vulnerabilities found
  #       if: steps.depcheck.outcome == 'failure'
  #       run: exit 1


  IaCScan:
    if: ${{ inputs.iac_scan }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.checkov.outcome }}
    steps:
      - uses: actions/checkout@v6

      - name: Run Checkov
        id: checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: kubernetes,terraform
          soft_fail: false
          output_format: sarif
          output_file_path: checkov.sarif

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: checkov-sarif
          path: checkov.sarif
      
      - name: Upload SARIF to Github Security
        if: ${{ always() && (github.event.repository.visibility == 'public' || inputs.ghas_enabled == true) }}
        uses: github/codeql-action/upload-sarif@v4 
        with:
          sarif_file: checkov.sarif

      # - name: Fail if vulnerabilities found
      #   if: steps.checkov.outcome == 'failure'
      #   run: exit 1

      
  Summary:
    if: ${{ !cancelled() }}
    needs: [SecretScan, SAST, SonarQubeScan, DependencyScan, IaCScan]
    runs-on: ubuntu-latest
    outputs:
      any_failed: ${{ steps.check.outputs.any_failed }}
    steps:
      - name: Generate Security Report Summary
        id: check
        run: |
          SECRET="${{ needs.SecretScan.outputs.outcome }}"
          SAST="${{ needs.SAST.outputs.outcome }}"
          SONAR="${{ needs.SonarQubeScan.outputs.outcome }}"
          DEPENDENCY="${{ needs.DependencyScan.outputs.outcome }}"
          IAC="${{ needs.IaCScan.outputs.outcome }}"

          get_status_em() {
            case "$1" in
              success) echo "🟢 Success" ;;
              failure) echo "🔴 Failure (Vulnerability Ditemukan!)" ;;
              skipped|*) echo "⚪ Skipped / Not Run" ;;
            esac
          }

          STATUS_SECRET=$(get_status_em "$SECRET")
          STATUS_SAST=$(get_status_em "$SAST")
          STATUS_SONAR=$(get_status_em "$SONAR")
          STATUS_DEPENDENCY=$(get_status_em "$DEPENDENCY")
          STATUS_IAC=$(get_status_em "$IAC")

          ANY_FAILED="false"
          RESULTS="$SECRET $SAST $SONAR $DEPENDENCY $IAC"
          if echo "$RESULTS" | grep -q failure; then
            ANY_FAILED="true"
          fi

          echo "## 🔒 Security Code Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$ANY_FAILED" = "true" ]; then
            echo "> ⚠️ **WARNING:** Ditemukan celah keamanan atau kegagalan pada proses pemindaian. Silakan periksa detail tab *Security* atau unduh *artifact* yang tersedia." >> $GITHUB_STEP_SUMMARY
          else
            echo "> ✅ **SUCCESS:** Semua pemindaian kode berhasil dilewati tanpa kendala kritis." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Secret Scan (Gitleaks) | $STATUS_SECRET |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ SAST Scan (Semgrep) | $STATUS_SAST |" >> $GITHUB_STEP_SUMMARY
          echo "| 🦊 SonarQube Scan | $STATUS_SONAR |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Dependency Scan (Trivy) | $STATUS_DEPENDENCY |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ IaC Scan (Checkov) | $STATUS_IAC |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY


          if [ "$ANY_FAILED" = "true" ]; then
            echo "any_failed=true" >> $GITHUB_OUTPUT
            
            echo "### 🛠️ Langkah Penyelesaian" >> $GITHUB_STEP_SUMMARY
            echo "1. Buka tab **Security** > **Code scanning** untuk melihat detail baris kode." >> $GITHUB_STEP_SUMMARY
            echo "2. Periksa bagian **Artifacts** jika membutuhkan file `.sarif`." >> $GITHUB_STEP_SUMMARY

            if [ "${{ inputs.fail_on_vulnerability }}" = "true" ]; then
              echo "::error title=🔒 Security Scan Failed::Workflow dihentikan karena fail_on_vulnerability diset true."
              exit 1
            else
              echo "::warning title=🔒 Security Scan Alert::Ditemukan celah keamanan, namun workflow tetap dilanjutkan (fail_on_vulnerability=false)."
            fi
          else
            echo "any_failed=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Comment PR dengan Hasil Scan
        if: ${{ steps.check.outputs.any_failed == 'true' && github.event_name == 'pull_request' }}
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            ## ⚠️ 🔒 SECURITY CODE SCAN ALERT
            Halo @${{ github.actor }}, pemindaian otomatis mendeteksi adanya celah keamanan atau rahasia (*secret*) yang bocor pada commit ini.
            
            Silakan cek detail lengkapnya pada tab **Actions** -> **Security Code Scan Report** di repositori ini sebelum melakukan merge!
  
