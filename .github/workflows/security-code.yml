name: Security Code Scan

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write
  pull-requests: write
  issues: write

on:
  workflow_call:
    inputs:
      ghas_enabled:
        description: 'Set true if private used GitHub Advanced Security License'
        required: false
        type: boolean
        default: false
       
      fail_on_vulnerability:
        description: 'If true, workflow can exit 1 if vulnerability found.'
        required: false
        type: boolean
        default: false

      secret_scan:
        description: 'Run Secret Scan'
        required: false
        type: boolean
        default: true
      gitleaks_config:
        description: "Path gitleaks config"
        required: false
        type: string
        default: ""
      sast_scan:
        description: 'Run SAST SCAN'
        required: false
        type: boolean
        default: true
      sonarqube_scan:
        description: 'Run SonarQube Scan'
        required: false
        type: boolean
        default: false
      dependency_scan:
        description: 'Run Dependency Scan'
        required: false
        type: boolean
        default: true
      iac_scan:
        description: 'Run IaC Scan'
        required: false
        type: boolean
        default: true

    outputs:
      secret_scan_result:
        value: ${{ jobs.SecretScan.outputs.outcome }}
      sast_result:
        value: ${{ jobs.SAST.outputs.outcome }}
      sonarqube_result:
        value: ${{ jobs.SonarQubeScan.result }}
      dependency_result:
        value: ${{ jobs.DependencyScan.outputs.outcome }}
      iac_result:
        value: ${{ jobs.IaCScan.outputs.outcome }}
      any_failed:
        value: ${{ jobs.Summary.outputs.any_failed }}


jobs:
  SecretScan:
    if: ${{ inputs.secret_scan }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.gitleaks.outcome }}
    steps:
      - uses: actions/checkout@v6
      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: ${{ !inputs.fail_on_vulnerability }} 
        env:
          GITLEAKS_CONFIG: ${{ inputs.gitleaks_config }}
        run: |
          CONFIG=""

          if [ -n "$GITLEAKS_CONFIG" ]; then
            CONFIG="--config=/repo/$GITLEAKS_CONFIG"
          fi
          
          docker run --rm \
            -v ${{ github.workspace }}:/repo \
            ghcr.io/gitleaks/gitleaks:v8.30.1 detect \
            --source=/repo \
            $CONFIG \
            --report-format sarif \
            --report-path /repo/gitleaks.sarif \
            --exit-code 1

      - name: Upload SARIF as Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif

      - name: Upload SARIF to Github Security
        if: ${{ always() && (github.event.repository.visibility == 'public' || inputs.ghas_enabled == true) }}
        uses: github/codeql-action/upload-sarif@v4 
        with:
          sarif_file: gitleaks.sarif

      # - name: Fail if secrets found 
      #   if: steps.gitleaks.outcome == 'failure'
      #   run: exit 1


  SAST:
    if: ${{ inputs.sast_scan }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.semgrep.outcome }}
    container:
      image: semgrep/semgrep
      
    steps:
      - uses: actions/checkout@v6
      
      - name: Run Semgrep
        id: semgrep
        continue-on-error: ${{ !inputs.fail_on_vulnerability }}
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --severity ERROR \
            --error \
            --output semgrep.sarif
            
      - name: Upload SARIF as Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          
      # - name: Fail if vulnerabilities found
      #   if: steps.semgrep.outcome == 'failure'
      #   run: exit 1

      - name: Upload SARIF to Github Security
        if: ${{ always() && (github.event.repository.visibility == 'public' || inputs.ghas_enabled == true) }}
        uses: github/codeql-action/upload-sarif@v4 
        with:
          sarif_file: semgrep.sarif

  # SonarQubeScan config example
  # sonar-project.properties
  # sonar.projectKey=example-api
  # sonar.projectName=Example Api
  # sonar.sources=.
  # sonar.exclusions=**/*_test.go,**/vendor/**
  # sonar.tests=.
  # sonar.test.inclusions=**/*_test.go
  SonarQubeScan:
    if: ${{ inputs.sonarqube_scan }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.sonar.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        id: sonar
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  DependencyScan:
    if: ${{ inputs.dependency_scan }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.trivyfs.outcome }}
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy FS
        id: trivyfs
        continue-on-error: ${{ !inputs.fail_on_vulnerability }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: 1

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif

      - name: Upload SARIF to Github Security
        if: ${{ always() && (github.event.repository.visibility == 'public' || inputs.ghas_enabled == true) }}
        uses: github/codeql-action/upload-sarif@v4 
        with:
          sarif_file: trivy-fs.sarif

      # - name: Generate Source Code SBOM
      #   id: trivysbom
      #   continue-on-error: true
      #   uses: aquasecurity/trivy-action@v0.36.0
      #   with:
      #     scan-type: 'fs'
      #     scan-ref: '.'
      #     format: 'spdx-json'
      #     output: 'trivy-fs-sbom.spdx.json'
      
      # - name: Upload Source Code SBOM Report
      #   if: always()
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: trivy-fs-sbom
      #     path: trivy-fs-sbom.spdx.json

      # - name: Fail if vulnerabilities found
      #   if: steps.trivyfs.outcome == 'failure'
      #   run: exit 1

  # DependencyScan:
  #   if: ${{ inputs.dependency_scan }}
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Dependency Check
  #       id: depcheck
  #       continue-on-error: true
  #       uses: dependency-check/Dependency-Check_Action@main
  #       with:
  #         project: service
  #         path: .
  #         format: HTML

  #     - name: Upload Dependency Check Report
  #       if: always()
  #       uses: actions/upload-artifact@v7
  #       with:
  #         name: dependency-check-report
  #         path: reports/dependency-check-report.html

  #     - name: Fail if vulnerabilities found
  #       if: steps.depcheck.outcome == 'failure'
  #       run: exit 1


  IaCScan:
    if: ${{ inputs.iac_scan }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.checkov.outcome }}
    steps:
      - uses: actions/checkout@v6

      - name: Run Checkov
        id: checkov
        continue-on-error: ${{ !inputs.fail_on_vulnerability }}
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: kubernetes,terraform
          soft_fail: false
          output_format: sarif
          output_file_path: checkov.sarif

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: checkov-sarif
          path: checkov.sarif
      
      - name: Upload SARIF to Github Security
        if: ${{ always() && (github.event.repository.visibility == 'public' || inputs.ghas_enabled == true) }}
        uses: github/codeql-action/upload-sarif@v4 
        with:
          sarif_file: checkov.sarif

      # - name: Fail if vulnerabilities found
      #   if: steps.checkov.outcome == 'failure'
      #   run: exit 1

      
  Summary:
    if: ${{ !cancelled() }}
    needs: [SecretScan, SAST, SonarQubeScan, DependencyScan, IaCScan]
    runs-on: ubuntu-latest
    outputs:
      any_failed: ${{ steps.check.outputs.any_failed }}
    env:
      OUTCOME_SECRET: ${{ needs.SecretScan.outputs.outcome }}
      OUTCOME_SAST: ${{ needs.SAST.outputs.outcome }}
      OUTCOME_SONAR: ${{ needs.SonarQubeScan.outputs.outcome }}
      OUTCOME_DEPENDENCY: ${{ needs.DependencyScan.outputs.outcome }}
      OUTCOME_IAC: ${{ needs.IaCScan.outputs.outcome }}
      FAIL_ON_VULN: ${{ inputs.fail_on_vulnerability }}
    steps:
      
      - name: Download Reports for Stats
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: security-reports

      - name: Generate Security Report Summary
        id: check
        run: |
          # Helper untuk mengubah status job menjadi emoji
          get_status_em() {
            case "$1" in
              success) echo "🟢 Success" ;;
              failure) echo "🔴 Failure" ;;
              skipped|*) echo "⚪ Skipped / Not Run" ;;
            esac
          }

          # Helper untuk menghitung jumlah vulnerability di file SARIF menggunakan jq
          count_sarif_vulnerabilities() {
            local file_pattern="$1"
            # Cari file sarif secara rekursif di folder download
            local file_path=$(find security-reports -name "$file_pattern" -type f | head -n 1)
            
            if [ -f "$file_path" ]; then
              # SARIF menyimpan temuan di dalam array .runs[].results[]
              local count=$(jq '[.runs[].results[]?] | length' "$file_path" 2>/dev/null || echo "0")
              echo "$count"
            else
              echo "-"
            fi
          }

          STATUS_SECRET=$(get_status_em "$OUTCOME_SECRET")
          STATUS_SAST=$(get_status_em "$OUTCOME_SAST")
          STATUS_SONAR=$(get_status_em "$OUTCOME_SONAR")
          STATUS_DEPENDENCY=$(get_status_em "$OUTCOME_DEPENDENCY")
          STATUS_IAC=$(get_status_em "$OUTCOME_IAC")

          # Hitung statistik temuan asli dari file SARIF yang berhasil di-download
          VULN_SECRET=$(count_sarif_vulnerabilities "gitleaks.sarif")
          VULN_SAST=$(count_sarif_vulnerabilities "semgrep.sarif")
          VULN_DEPENDENCY=$(count_sarif_vulnerabilities "trivy-fs.sarif")
          VULN_IAC=$(count_sarif_vulnerabilities "checkov.sarif")

          ANY_FAILED="false"
          RESULTS="$OUTCOME_SECRET $OUTCOME_SAST $OUTCOME_SONAR $OUTCOME_DEPENDENCY $OUTCOME_IAC"
          if echo "$RESULTS" | grep -q failure; then
            ANY_FAILED="true"
          fi

          # Mulai menulis Markdown ke Summary Page
          echo "## 🔒 Security Code Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$ANY_FAILED" = "true" ]; then
            echo "> ⚠️ **WARNING:** Ditemukan celah keamanan atau kegagalan pada proses pemindaian. Silakan periksa detail tab *Security* atau unduh *artifact* yang tersedia." >> $GITHUB_STEP_SUMMARY
          else
            echo "> ✅ **SUCCESS:** Semua pemindaian kode berhasil dilewati tanpa kendala kritis." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          # Tabel yang kini dilengkapi kolom "Temuan (Vulnerabilities)"
          echo "| Security Scanner | Status | Temuan (Vulnerabilities) |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Secret Scan (Gitleaks) | $STATUS_SECRET | **$VULN_SECRET** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ SAST Scan (Semgrep) | $STATUS_SAST | **$VULN_SAST** |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Dependency Scan (Trivy) | $STATUS_DEPENDENCY | **$VULN_DEPENDENCY** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ IaC Scan (Checkov) | $STATUS_IAC | **$VULN_IAC** |" >> $GITHUB_STEP_SUMMARY
          echo "| 🦊 SonarQube Scan | $STATUS_SONAR | *Lihat di Sonar Dashboard* |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$ANY_FAILED" = "true" ]; then
            echo "any_failed=true" >> $GITHUB_OUTPUT

            if [ "$FAIL_ON_VULN" = "true" ]; then
              echo "::error title=🔒 Security Scan Failed::Workflow dihentikan karena fail_on_vulnerability diset true."
              exit 1
            else
              echo "::warning title=🔒 Security Scan Alert::Ditemukan celah keamanan, namun workflow tetap dilanjutkan (fail_on_vulnerability=false)."
            fi
          else
            echo "any_failed=false" >> $GITHUB_OUTPUT
          fi

      # ==========================================
      # Pipeline Status
      # ==========================================

      - name: Pipeline Completed Successfully
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pipeline-status
          message: |
            ## ✅ Pipeline Completed Successfully

            All workflow checks completed successfully.

            | Item | Value |
            |------|-------|
            | Workflow | `${{ github.workflow }}` |
            | Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            The CI/CD pipeline completed successfully.

      - name: Pipeline Failed
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pipeline-status
          message: |
            ## ❌ Pipeline Failed

            One or more workflow checks failed.

            | Item | Value |
            |------|-------|
            | Workflow | `${{ github.workflow }}` |
            | Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            Please review the workflow logs before merging this pull request.

      # ==========================================
      # Security Findings
      # ==========================================

      - name: Security Findings Detected
        if: ${{ steps.check.outputs.any_failed == 'true' && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: security-findings
          message: |
            ## ⚠️ Security Findings Detected

            Hi @${{ github.actor }},

            The automated security scan detected one or more potential security vulnerabilities or exposed secrets.

            Please review the **Security Code Scan Report** in the **Actions** tab and resolve the reported findings before merging this pull request.

            | Item | Value |
            |------|-------|
            | Workflow | `${{ github.workflow }}` |
            | Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

      - name: Remove Security Findings Comment
        if: ${{ steps.check.outputs.any_failed != 'true' && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: security-findings
          delete: true
  
