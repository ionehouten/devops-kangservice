name: Security Image Scan

permissions:
  contents: read
  actions: read
  id-token: write
  security-events: write
  pull-requests: write
  issues: write

on:
  workflow_call:
    inputs:
      ghas_enabled:
        description: 'Set true if private used GitHub Advanced Security License'
        required: false
        type: boolean
        default: false

      fail_on_vulnerability:
        description: 'If true, workflow can exit 1 if vulnerability found.'
        required: false
        type: boolean
        default: false
      
      image_ref:
        description: 'Fully Image reference'
        required: true
        type: string
      
      digest:
        description: 'Image digest'
        required: true
        type: string

      container_scan:
        description: 'Run Container Scan'
        required: false
        type: boolean
        default: true
      
    outputs:
      container_scan_result:
        value: ${{ jobs.ContainerScan.result }}
      any_failed:
        value: ${{ jobs.Summary.outputs.any_failed }}


jobs:

  ContainerScan:
    if: ${{ inputs.container_scan && inputs.image_ref != '' }}
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.trivy.outcome }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Authenticate to Registry
        uses: ionehouten/devops-kangservice/.github/actions/registry-login@main
        with:
          image_ref: ${{ inputs.image_ref }}
          
          # AWS Variables
          aws_region: ${{ secrets.AWS_REGION }}
          aws_role_to_assume: ${{ secrets.AWS_ROLE_ARN }}
          
          # GCP Variables
          gcp_project_dev: ${{ secrets.GCP_PROJECT_ID_DEV }}
          gcp_sa_dev: ${{ secrets.GCP_SA_DEV }}
          gcp_project_stg: ${{ secrets.GCP_PROJECT_ID_STG }}
          gcp_sa_stg: ${{ secrets.GCP_SA_STG }}
          gcp_project_prd: ${{ secrets.GCP_PROJECT_ID_PRD }}
          gcp_sa_prd: ${{ secrets.GCP_SA_PRD }}
          
          gcp_project_shared: ${{ secrets.GCP_PROJECT_ID_SHARED }}
          gcp_sa_shared: ${{ secrets.GCP_SA_SHARED }}
          
          # GHCR Variables
          ghcr_domain: ${{ secrets.GHCR_DOMAIN }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Scan Image
        id: trivy
        continue-on-error: ${{ !inputs.fail_on_vulnerability }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ inputs.image_ref }}"
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-image.sarif
          exit-code: 1

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif

      - name: Upload SARIF to Github Security
        if: ${{ always() && (github.event.repository.visibility == 'public' || inputs.ghas_enabled == true) }}
        uses: github/codeql-action/upload-sarif@v4 
        with:
          sarif_file: trivy-image.sarif

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ inputs.image_ref }}"
          format: 'spdx-json'
          output: 'sbom.spdx.json'

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
      
      - name: Submit SBOM to GitHub Dependency Graph
        uses: advanced-security/spdx-dependency-submission-action@v0.1.1
        with:
          file-path: "sbom.spdx.json"

      # - name: Fail if vulnerabilities found
      #   if: steps.trivy.outcome == 'failure'
      #   run: exit 1

  SignImage:
    if: ${{ needs.ContainerScan.result == 'success' &&  inputs.container_scan && inputs.image_ref != ''  }}
    needs: ['ContainerScan']
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: ${{ inputs.image_ref }}
      DIGEST: ${{ inputs.digest }}
    steps:
      - name: Authenticate to Registry
        uses: ionehouten/devops-kangservice/.github/actions/registry-login@main
        with:
          image_ref: ${{ inputs.image_ref }}
          
          # AWS Variables
          aws_region: ${{ secrets.AWS_REGION }}
          aws_role_to_assume: ${{ secrets.AWS_ROLE_ARN }}
          
          # GCP Variables
          gcp_project_dev: ${{ secrets.GCP_PROJECT_ID_DEV }}
          gcp_sa_dev: ${{ secrets.GCP_SA_DEV }}
          gcp_project_stg: ${{ secrets.GCP_PROJECT_ID_STG }}
          gcp_sa_stg: ${{ secrets.GCP_SA_STG }}
          gcp_project_prd: ${{ secrets.GCP_PROJECT_ID_PRD }}
          gcp_sa_prd: ${{ secrets.GCP_SA_PRD }}
          
          gcp_project_shared: ${{ secrets.GCP_PROJECT_ID_SHARED }}
          gcp_sa_shared: ${{ secrets.GCP_SA_SHARED }}
          
          # GHCR Variables
          ghcr_domain: ${{ secrets.GHCR_DOMAIN }}
          ghcr_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        id: sign
        run: |
          cosign sign --yes "$IMAGE_REF@$DIGEST"
    
  Summary:
    if: ${{ !cancelled() }}
    needs: [ContainerScan, SignImage]
    runs-on: ubuntu-latest
    outputs:
      any_failed: ${{ steps.check.outputs.any_failed }}
    env:
      OUTCOME_CONTAINER: ${{ needs.ContainerScan.outputs.outcome }}
      FAIL_ON_VULN: ${{ inputs.fail_on_vulnerability }}
    steps:
      - name: Generate Security Report Summary
        id: check
        run: |
          get_status_em() {
            case "$1" in
              success) echo "🟢 Success" ;;
              failure) echo "🔴 Failure (Vulnerability Ditemukan!)" ;;
              skipped|*) echo "⚪ Skipped / Not Run" ;;
            esac
          }

          STATUS_CONTAINER=$(get_status_em "$OUTCOME_CONTAINER")

          ANY_FAILED="false"
          RESULTS="$OUTCOME_CONTAINER"
          if echo "$RESULTS" | grep -q failure; then
            ANY_FAILED="true"
          fi

          echo "## 🔒 Security Image Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$ANY_FAILED" = "true" ]; then
            echo "> ⚠️ **WARNING:** Ditemukan celah keamanan atau kegagalan pada proses pemindaian. Silakan periksa detail tab *Security* atau unduh *artifact* yang tersedia." >> $GITHUB_STEP_SUMMARY
          else
            echo "> ✅ **SUCCESS:** Pemindaian Container berhasil dilewati tanpa kendala kritis." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Container Scan (Trivy) | $STATUS_CONTAINER |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$ANY_FAILED" = "true" ]; then
            echo "any_failed=true" >> $GITHUB_OUTPUT
            
            echo "### 🛠️ Langkah Penyelesaian" >> $GITHUB_STEP_SUMMARY
            echo "1. Buka tab **Security** > **Container scanning** untuk melihat detail baris kode." >> $GITHUB_STEP_SUMMARY
            echo "2. Periksa bagian **Artifacts** jika membutuhkan file `.sarif`." >> $GITHUB_STEP_SUMMARY

            if [ "$FAIL_ON_VULN" = "true" ]; then
              echo "::error title=🔒 Security Scan Failed::Workflow dihentikan karena fail_on_vulnerability diset true."
              exit 1
            else
              echo "::warning title=🔒 Security Scan Alert::Ditemukan celah keamanan, namun workflow tetap dilanjutkan (fail_on_vulnerability=false)."
            fi
          else
            echo "any_failed=false" >> $GITHUB_OUTPUT
          fi


      # ==========================================
      # Pipeline Status
      # ==========================================

      - name: Pipeline Completed Successfully
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pipeline-status
          message: |
            ## ✅ Pipeline Completed Successfully

            All workflow checks completed successfully.

            | Item | Value |
            |------|-------|
            | Workflow | `${{ github.workflow }}` |
            | Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            The CI/CD pipeline completed successfully.

      - name: Pipeline Failed
        if: ${{ failure() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pipeline-status
          message: |
            ## ❌ Pipeline Failed

            One or more workflow checks failed.

            | Item | Value |
            |------|-------|
            | Workflow | `${{ github.workflow }}` |
            | Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            Please review the workflow logs before merging this pull request.

      # ==========================================
      # Security Findings
      # ==========================================

      - name: Security Findings Detected
        if: ${{ steps.check.outputs.any_failed == 'true' && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: security-findings
          message: |
            ## ⚠️ Security Findings Detected

            Hi @${{ github.actor }},

            The automated security scan detected one or more potential security vulnerabilities or exposed secrets.

            Please review the **Security Code Scan Report** in the **Actions** tab and resolve the reported findings before merging this pull request.

            | Item | Value |
            |------|-------|
            | Workflow | `${{ github.workflow }}` |
            | Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

      - name: Remove Security Findings Comment
        if: ${{ steps.check.outputs.any_failed != 'true' && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: security-findings
          delete: true