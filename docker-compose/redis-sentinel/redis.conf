# redis.conf

# Port settings
bind 0.0.0.0
port 6379 
# port 0
tls-port 6380 

# TLS certificates and key for encrypted communication
tls-cert-file /certs/redis.crt
tls-key-file /certs/redis.key
tls-ca-cert-file /certs/ca.crt
# You can set this to 'yes' if you require client authentication
tls-auth-clients no  
tls-replication yes

# Persistence settings
appendonly yes
# Sync AOF data every second to disk
appendfsync everysec  
# Save the DB every 15 minutes if at least one key has changed
save 900 1  
# Save the DB every 5 minutes if at least 10 keys have changed
save 300 10 
# Save the DB every minute if at least 10000 keys have changed
save 60 10000 
# Continue writing data even if BGSAVE fails
stop-writes-on-bgsave-error no  

# save into memory
repl-diskless-sync no
repl-diskless-load on-empty-db

# Network settings
# Max number of pending connections
tcp-backlog 65535  
 # Enable TCP keep-alive
tcp-keepalive 60 
# Max number of simultaneous clients
maxclients 10000  
# Max memory Redis is allowed to use
maxmemory 128mb  
# Use LRU eviction policy to remove least recently used keys when maxmemory is reached
maxmemory-policy allkeys-lru  

# Security settings
# Auth password for default user
requirepass supersecureadmin

# Auth User/Pass for replica
masteruser admin
masterauth supersecureadmin

# ACL
aclfile /usr/local/etc/redis/users.acl

# Latency monitoring
# Monitor latency, log if > 100ms
latency-monitor-threshold 100 

# Logging debug, verbose, notice, warning
loglevel debug





