  redis-cluster-init:
    container_name: redis-cluster-init
    image: redis:7.4-alpine
    env_file: .env  
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
      redis-node-6:
        condition: service_healthy
    # entrypoint: >
    #   sh -c "sleep 10; echo yes | redis-cli --cluster create 192.168.81.11:6379 192.168.81.12:6379 192.168.81.13:6379 192.168.81.14:6379 192.168.81.15:6379 192.168.81.16:6379 --cluster-replicas 1 --user admin -a ${REDIS_ADMIN_PASSWORD} "
    entrypoint: >
      sh -c "sleep 10; echo yes | redis-cli --cluster create ${HOST_IP}:7000 ${HOST_IP}:7002 ${HOST_IP}:7004 ${HOST_IP}:7006 ${HOST_IP}:7008 ${HOST_IP}:7010 --cluster-replicas 1 --user admin -a ${REDIS_ADMIN_PASSWORD} "
    networks:
      default:

  redis-exporter:
    image: oliver006/redis_exporter:v1.73.0
    container_name: redis-exporter
    restart: always
    ports:
      - "9121:9121"
    command:
      - '--redis.addr=redis://admin:${REDIS_ADMIN_PASSWORD}@192.168.81.11:6379'
      - '--redis.password=${REDIS_ADMIN_PASSWORD}'
      - '--redis.user=admin'
      - '--is-cluster'
      - '--web.listen-address=:9121'
      - '--include-system-metrics'
      - '--skip-tls-verification'
    depends_on:
      redis-node-1:
        condition: service_healthy
    networks:
      default:


