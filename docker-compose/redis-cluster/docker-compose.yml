
name: redis-cluster

services:
  redis-node-1:
    container_name: redis-node-1
    user: "999:999"
    image: redis:7.4-alpine
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf  --cluster-announce-ip ${HOST_IP} --cluster-announce-port 7000 --cluster-announce-tls-port 7001 --cluster-announce-bus-port 17000
    env_file: .env  
    sysctls:
      net.core.somaxconn: 65535
    ports:
      - 7000:6379
      - 7001:6380
      - 17000:16379
    volumes:
      - ./certs:/certs:ro
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - ./users.acl:/usr/local/etc/redis/users.acl
      - ${DOCKER_VOLUME_DIRECTORY:-./volumes}/redis-node-1:/data
    # deploy:
    #   resources:
    #     limits:
    #       memory: 128M
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "redis-cli --user admin -a ${REDIS_ADMIN_PASSWORD} -p 6379 ping | grep PONG || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      default:
        ipv4_address: 192.168.81.11

