# redis.conf

# Persistence settings
appendonly yes
# Sync AOF data every second to disk
appendfsync everysec  
# Save the DB every 15 minutes if at least one key has changed
save 900 1  
# Save the DB every 5 minutes if at least 10 keys have changed
save 300 10 
# Save the DB every minute if at least 10000 keys have changed
save 60 10000 
# Continue writing data even if BGSAVE fails
stop-writes-on-bgsave-error no  

# Network settings
# Max number of pending connections
tcp-backlog 65535  
 # Enable TCP keep-alive
tcp-keepalive 60 
# Max number of simultaneous clients
maxclients 10000  
# Max memory Redis is allowed to use
maxmemory 128mb  
# Use LRU eviction policy to remove least recently used keys when maxmemory is reached
maxmemory-policy allkeys-lru  

# Security settings
aclfile /usr/local/etc/redis/users.acl

# Latency monitoring
# Monitor latency, log if > 100ms
latency-monitor-threshold 100 

# Logging debug, verbose, notice, warning
loglevel notice
