
name: redis

services:
  redis-server:
    container_name: redis-server
    image: redis:8.0-alpine
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf 
    environment:
      TZ: Asia/Jakarta
    sysctls:
      net.core.somaxconn: 65535
    ports:
      - ${REDIS_PORT}:6379
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - ./users.acl:/usr/local/etc/redis/users.acl
      - ${DOCKER_VOLUME_DIRECTORY:-./volumes}/redis:/data
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -u redis://admin:${REDIS_ADMIN_PASSWORD}@localhost:6379 ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default
  
  redis-exporter:
    container_name: redis-exporter
    image: oliver006/redis_exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis-server:6379
      REDIS_USER: admin
      REDIS_PASSWORD: ${REDIS_ADMIN_PASSWORD}
    networks:
      - default

networks:
  default:
    name: core
